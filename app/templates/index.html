<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Counter</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .card-custom {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .counter {
            font-size: 60px;
            font-weight: bold;
            color: cyan;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h1>🚀 Flask Dashboard</h1>
        <p class="text-light">Hostname: {{ hostname }}</p>
    </div>

    <!-- COUNTER CARD -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-4">
            <div class="card card-custom text-center p-4">
                <h5 class="text-white">Total Kunjungan</h5>
                <div id="counter" class="counter">{{ count }}</div>
		<!-- BUTTON RESET -->
    		<button onclick="resetCounter()" class="btn btn-danger mt-3">
        		🔄 Reset Counter
    		</button>
            </div>
        </div>
    </div>

    <!-- CHART -->
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card card-custom p-4">
                <h5 class="text-white">📈 Grafik Kunjungan</h5>
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
let dataPoints = [];

async function updateChart() {
    const res = await fetch('/api');
    const data = await res.json();

    dataPoints.push(data.counter);

    if (dataPoints.length > 15) {
        dataPoints.shift();
    }

    chart.data.labels = dataPoints.map((_, i) => i+1);
    chart.data.datasets[0].data = dataPoints;
    chart.update();

    document.getElementById("counter").innerText = data.counter;
}

async function resetCounter() {
    if (confirm("Yakin reset counter?")) {
        await fetch('/reset', { method: 'POST' });

        // reset chart
        dataPoints = [];

        // langsung update UI
        document.getElementById("counter").innerText = 0;

        // paksa update dari API
        updateChart();
    }
}

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Jumlah Kunjungan',
            data: [],
            borderColor: 'cyan',
            backgroundColor: 'rgba(0,255,255,0.2)',
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: {
                    color: 'white'
                }
            }
        },
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        }
    }
});

setInterval(updateChart, 2000);
</script>

</body>
</html>

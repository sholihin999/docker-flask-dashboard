version: '3.8'

services:
  app:
    build: ./app
    container_name: flask-app
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - backend
      - frontend

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - frontend

volumes:
  redis-data:

networks:
  backend:
  frontend:
